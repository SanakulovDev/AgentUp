name: Publish to npm and GitHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # GitHub Packages-ga yozish uchun ruxsat
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(npm run -s version:show)"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      # 1. NPM-ga yuklash (Mavjud qadam)
      - name: Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 2. GitHub Packages-ga yuklash (GitHub profilingizda ko'rinishi uchun)
      - name: Publish to GitHub Packages
        if: success() # Faqat NPM-ga muvaffaqiyatli yuklansa ishlaydi
        run: |
          # Diqqat: GitHub Packages uchun paket nomi @SanakulovDev/agentup-cli bo'lishi shart.
          # Agar package.json da nom shunchaki "agentup-cli" bo'lsa, quyidagi buyruq nomini vaqtincha o'zgartirib yuklaydi:
          npm pkg set name=@SanakulovDev/agentup-cli
          npm config set //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram about successful publish
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>AgentUp published successfully!</b>%0A%0A🌐 <a href='https://agentup.uz'>AgentUp.uz</a>%0A👤 ${{ github.actor }}%0A📝 ${{ github.event.head_commit.message }}%0A🕐 $(TZ='Asia/Tashkent' date +'%Y-%m-%d %H:%M') (Toshkent)"